<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phaser 4 Interior Mapping</title>
  </head>
  <body>
    <main id="app">
      <div id="game"></div>
      <div class="hud" aria-hidden="true">
        <strong>Interior Mapping</strong>
        <span>WASD pan camera · Z zoom in · X zoom out</span>
        <span id="camera-readout">x 0 y 0</span>
        <span id="fps-readout">fps 0</span>
      </div>
      <div id="export-modal" class="export-modal" hidden>
        <div class="export-modal__backdrop" data-export-close></div>
        <section class="export-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="export-title">
          <header class="export-modal__header">
            <div>
              <h2 id="export-title">Filter Config</h2>
              <p>TypeScript snippet for the current single-room settings.</p>
            </div>
            <div class="export-modal__actions">
              <button id="copy-export-code" class="icon-button" type="button" aria-label="Copy TypeScript code" title="Copy TypeScript code">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="9" y="9" width="10" height="10" rx="2"></rect>
                  <path d="M5 15V7a2 2 0 0 1 2-2h8"></path>
                </svg>
              </button>
              <button id="close-export-modal" class="icon-button" type="button" aria-label="Close export modal" title="Close">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M18 6 6 18"></path>
                  <path d="m6 6 12 12"></path>
                </svg>
              </button>
            </div>
          </header>
          <pre class="export-modal__code"><code id="export-code" class="language-typescript"></code></pre>
          <p id="copy-status" class="copy-status" role="status" aria-live="polite"></p>
        </section>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
